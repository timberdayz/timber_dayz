name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt', '**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          pip install pytest pytest-asyncio pytest-cov black==25.1.0 ruff mypy
          # 注意: pyproject.toml 只包含工具配置（black/ruff/pytest），不是可安装包
          # 项目依赖通过 requirements.txt 安装，不需要 pip install -e .

      - name: Verify skill-first rule consistency
        run: |
          python scripts/verify_rules_completeness.py

      - name: Install Playwright browsers
        run: |
          pip install playwright || echo "Playwright installation failed, continuing..."
          playwright install chromium || echo "Chromium installation failed, continuing..."
        continue-on-error: true

      - name: Detect changed Python files
        id: changed-python
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        run: |
          CHANGED_PYTHON_FILES="$(python scripts/ci_changed_python_files.py --shell)"
          echo "files=${CHANGED_PYTHON_FILES}" >> $GITHUB_OUTPUT
          if [ -n "${CHANGED_PYTHON_FILES}" ]; then
            echo "[INFO] Changed Python files: ${CHANGED_PYTHON_FILES}"
          else
            echo "[INFO] No changed Python files in scoped CI paths"
          fi

      - name: Detect changed test files
        id: changed-tests
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        run: |
          CHANGED_TEST_FILES="$(python scripts/ci_changed_python_files.py --shell --tests-only)"
          echo "files=${CHANGED_TEST_FILES}" >> $GITHUB_OUTPUT
          if [ -n "${CHANGED_TEST_FILES}" ]; then
            echo "[INFO] Changed test files: ${CHANGED_TEST_FILES}"
          else
            echo "[INFO] No changed test files in scoped CI paths"
          fi

      - name: Create test environment
        run: |
          mkdir -p data logs temp
          # 使用 env.template 或 .env.template（兼容两种命名）
          if [ -f env.template ]; then
            cp env.template .env
          elif [ -f .env.template ]; then
            cp .env.template .env
          else
            echo "Creating minimal .env for testing"
            touch .env
          fi
          # 设置测试用的环境变量
          echo "TEST_MODE=true" >> .env
          echo "DATABASE_NAME=test_sales_analytics.db" >> .env
          echo "ACCOUNT_ENCRYPTION_KEY=$(python -c 'import secrets; print(secrets.token_hex(32))')" >> .env
          echo "SECRET_KEY=$(python -c 'import secrets; print(secrets.token_hex(32))')" >> .env
          echo "JWT_SECRET_KEY=$(python -c 'import secrets; print(secrets.token_hex(32))')" >> .env

      - name: Code formatting check
        run: |
          if [ -n "${{ steps.changed-python.outputs.files }}" ]; then
            black --check --diff ${{ steps.changed-python.outputs.files }}
          else
            echo "No changed Python files for formatting check"
          fi

      - name: Linting
        run: |
          if [ -n "${{ steps.changed-python.outputs.files }}" ]; then
            ruff check ${{ steps.changed-python.outputs.files }}
          else
            echo "No changed Python files for linting"
          fi

      - name: Type checking (critical modules only)
        if: matrix.python-version == '3.11'
        run: |
          mypy modules/core/ --ignore-missing-imports || true

      - name: Validate configurations
        run: |
          python scripts/validate_configs.py --ci || echo "Configuration validation completed"
        continue-on-error: true

      - name: Database Design Rules Validation
        run: |
          echo "Validating database design rules..."
          python scripts/validate_code_compliance.py || echo "Validation completed with warnings"
          echo "Database design rules validation completed"
        continue-on-error: true

      - name: Run contract tests
        run: |
          # 检查并运行存在的契约测试
          for script in modules/apps/account_manager/contract_tests.py \
                       modules/apps/collection_center/contract_tests.py \
                       modules/apps/web_interface_manager/contract_tests.py; do
            if [ -f "$script" ]; then
              python "$script" || echo "$(basename $script) completed"
            else
              echo "$(basename $script) not found, skipping"
            fi
          done
        continue-on-error: true

      - name: Run unified health check
        run: |
          if [ -f tests/test_unified_health_check.py ]; then
            python tests/test_unified_health_check.py || echo "Unified health check completed"
          else
            echo "test_unified_health_check.py not found, skipping"
          fi
        continue-on-error: true

      - name: Run pytest (if test files exist)
        run: |
          TEST_PATHS="${{ steps.changed-tests.outputs.files }}"
          if [ -n "${TEST_PATHS}" ]; then
            pytest ${TEST_PATHS} -v --cov=backend --cov=modules --cov-report=xml
          else
            echo "No changed test files found, skipping pytest"
          fi

      - name: Run performance regression entry
        if: matrix.python-version == '3.11'
        run: |
          python scripts/verify_performance_regression.py --mode ci

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install security tools
        run: |
          pip install bandit safety

      - name: Detect changed Python files
        id: changed-python
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        run: |
          CHANGED_PYTHON_FILES="$(python scripts/ci_changed_python_files.py --shell --exclude-tests)"
          echo "files=${CHANGED_PYTHON_FILES}" >> $GITHUB_OUTPUT
          if [ -n "${CHANGED_PYTHON_FILES}" ]; then
            echo "[INFO] Changed Python files: ${CHANGED_PYTHON_FILES}"
          else
            echo "[INFO] No changed Python files in scoped CI paths"
          fi

      - name: Run Bandit security scan
        run: |
          if [ -n "${{ steps.changed-python.outputs.files }}" ]; then
            bandit -s B608 ${{ steps.changed-python.outputs.files }} -f json -o bandit-report.json
            bandit -s B608 ${{ steps.changed-python.outputs.files }}
          else
            echo "No changed Python files for Bandit scan"
          fi

      - name: Check for known vulnerabilities
        run: |
          safety check --json

      - name: Check for secrets in code
        run: |
          echo "Scanning changed Python files for potential hardcoded secrets..."
          if [ -n "${{ steps.changed-python.outputs.files }}" ]; then
            MATCHES=$(grep -nE "(password|secret_key|api_key|token)\s*=\s*['\"][^'\"]+['\"]" ${{ steps.changed-python.outputs.files }} | grep -v "# noqa" | grep -v "example" | grep -v "os.getenv" | grep -v "os.environ" | grep -v "settings\." | grep -v "config\." || true)
            if [ -n "${MATCHES}" ]; then
              echo "${MATCHES}"
              echo "Found potential hardcoded secrets"
              exit 1
            fi
          else
            echo "No changed Python files for secret scan"
          fi
          echo "Secret scan completed"

  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Check project structure
        run: |
          # 验证关键目录和文件存在
          echo "Checking project structure..."
          test -d modules/core || (echo "Missing modules/core directory" && exit 1)
          test -d modules/apps || (echo "Missing modules/apps directory" && exit 1)
          # env.template 是标准文件名
          test -f env.template || test -f .env.template || echo "Note: env template file not found (optional)"
          echo "Project structure check passed"

      - name: Check for large files
        run: |
          # 检查是否有大文件被意外提交
          find . -type f -size +10M -not -path "./.git/*" | while read file; do
            echo "Warning: Large file found: $file"
          done || true
          echo "Large file check completed"

      - name: Validate configuration files
        run: |
          # 验证YAML配置文件语法
          pip install pyyaml || true
          python -c "
          import yaml
          import os
          from pathlib import Path

          config_dir = Path('config')
          if config_dir.exists():
              for yaml_file in config_dir.rglob('*.yaml'):
                  try:
                      with open(yaml_file, 'r', encoding='utf-8') as f:
                          yaml.safe_load(f)
                      print(f'{yaml_file} syntax OK')
                  except Exception as e:
                      print(f'{yaml_file} syntax error: {e}')
                      # Don't exit, just report
          else:
              print('No config directory found, skipping YAML validation')
          " || echo "YAML validation completed"
        continue-on-error: true

  # Phase 3.1: Docker 镜像构建（可选集成）
  # 注意：镜像构建已在独立的 docker-build.yml 工作流中实现
  # 如需在 CI 中自动触发，可取消下面的注释
  # build-images:
  #   needs: [test, security-scan, build-check]
  #   if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
  #   uses: ./.github/workflows/docker-build.yml

  notify:
    runs-on: ubuntu-latest
    needs: [test, security-scan, build-check]
    if: always()
    steps:
      - name: Notify results
        run: |
          if [ "${{ needs.test.result }}" == "success" ] && [ "${{ needs.security-scan.result }}" == "success" ] && [ "${{ needs.build-check.result }}" == "success" ]; then
            echo "[OK] All CI checks passed!"
          else
            echo "[FAIL] Some CI checks failed"
            echo "Test: ${{ needs.test.result }}"
            echo "Security: ${{ needs.security-scan.result }}"
            echo "Build: ${{ needs.build-check.result }}"
          fi
