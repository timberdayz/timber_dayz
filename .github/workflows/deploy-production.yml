name: Deploy to Production

on:
  # [NOTE] 鏂规A锛氱敓浜у彂甯冨彧閫氳繃 push tag(v*) 瑙﹀彂锛堝悓涓€鏉℃祦姘寸嚎鍐?build -> deploy锛?
  push:
    tags:
      - "v*"
  # [NOTE] 鎵嬪姩閮ㄧ讲锛氱敤浜庡洖婊氭垨閲嶈瘯锛堜笉浼氶噸鏂?build 闀滃儚锛屽彧閮ㄧ讲鎸囧畾 tag锛?
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g., v4.19.7)"
        required: true
        type: string
      confirm:
        description: 'Type "DEPLOY" to confirm production deployment'
        required: true
        type: string

# [NOTE] 骞跺彂鎺у埗锛氬悓涓€鏃堕棿鍙厑璁镐竴涓敓浜ч儴缃插湪杩愯锛堥伩鍏嶅甫瀹?璧勬簮鍐茬獊锛?
concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: ${{ github.repository }}/backend
  IMAGE_NAME_FRONTEND: ${{ github.repository }}/frontend
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # 妫€鏌ユ槸鍚﹂厤缃簡蹇呰鐨?secrets
  check-config:
    runs-on: ubuntu-latest
    outputs:
      can_deploy: ${{ steps.check.outputs.can_deploy }}
    steps:
      - name: Check deployment configuration
        id: check
        run: |
          if [ -z "${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}" ] || [ -z "${{ secrets.PRODUCTION_HOST }}" ] || [ -z "${{ secrets.PRODUCTION_HOST_KEY }}" ]; then
            echo "Production deployment secrets not configured. Skipping deployment."
            echo "Required secrets: PRODUCTION_SSH_PRIVATE_KEY, PRODUCTION_HOST, PRODUCTION_HOST_KEY"
            echo "can_deploy=false" >> $GITHUB_OUTPUT
          else
            echo "Production deployment secrets configured. Proceeding with deployment."
            echo "can_deploy=true" >> $GITHUB_OUTPUT
          fi

  validate:
    name: Validate Data Flow (Release Gate)
    runs-on: ubuntu-latest
    needs: check-config
    if: ${{ needs.check-config.outputs.can_deploy == 'true' && github.event_name == 'push' }}
    services:
      # 娣诲姞涓存椂 PostgreSQL 鏈嶅姟鐢ㄤ簬杩佺Щ娴嬭瘯
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: migration_test_user
          POSTGRES_PASSWORD: migration_test_pass
          POSTGRES_DB: migration_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code (tag)
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Create temp directory
        run: mkdir -p temp

      # [FIX] 璁＄畻鏈鍙戝竷鏀瑰姩鐨勬枃浠讹紙鍙獙璇佹敼鍔ㄦ枃浠讹紝閬垮厤鍘嗗彶閬楃暀闂闃绘柇鏂板彂甯冿級
      - name: Get changed files since last tag
        id: changed-files
        run: |
          # Fetch all release tags before diffing against the current tag.
          git fetch --tags --force

          # 鑾峰彇褰撳墠 tag
          CURRENT_TAG="${{ github.ref_name }}"
          echo "[INFO] Current tag: ${CURRENT_TAG}"

          # Determine the previous release tag, excluding the current tag.
          ALL_TAGS=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$')
          PREV_TAG=$(echo "${ALL_TAGS}" | grep -v "^${CURRENT_TAG}$" | head -n 1)

          if [ -z "${PREV_TAG}" ]; then
            echo "[INFO] No previous release tag found; validating the full file set."
            echo "has_prev_tag=false" >> $GITHUB_OUTPUT
            echo "prev_tag=" >> $GITHUB_OUTPUT
            echo "changed_count=0" >> $GITHUB_OUTPUT
          else
            echo "[INFO] 涓婁竴涓?tag: ${PREV_TAG}"
            echo "has_prev_tag=true" >> $GITHUB_OUTPUT
            echo "prev_tag=${PREV_TAG}" >> $GITHUB_OUTPUT
            
            # 璁＄畻鏀瑰姩鐨勬枃浠讹紙鐩稿浜庨」鐩牴鐩綍锛?            # 娉ㄦ剰锛欻EAD 鎸囧悜褰撳墠 checkout 鐨?tag commit
            git diff --name-only ${PREV_TAG}..HEAD > temp/changed_files.txt || true
            
            # Count changed files since the previous release tag.
            CHANGED_COUNT=$(wc -l < temp/changed_files.txt | tr -d ' ' || echo "0")
            echo "[INFO] Found ${CHANGED_COUNT} changed files from ${PREV_TAG} to ${CURRENT_TAG}."
            echo "changed_count=${CHANGED_COUNT}" >> $GITHUB_OUTPUT
            
            # 鏄剧ず鍓?0涓敼鍔ㄧ殑鏂囦欢锛堢敤浜庤皟璇曪級
            if [ "${CHANGED_COUNT}" -gt 0 ]; then
              echo "[INFO] 鏀瑰姩鐨勬枃浠讹紙鍓?0涓級:"
              head -10 temp/changed_files.txt | sed 's/^/  - /'
              
              # 鏄剧ず鏀瑰姩鐨?router 鏂囦欢鏁伴噺
              ROUTER_COUNT=$(grep -c "^backend/routers/.*\.py$" temp/changed_files.txt || echo "0")
              echo "[INFO] Changed router files: ${ROUTER_COUNT}"
            else
              echo "[INFO] No changed files detected; the tag may point to an existing commit."
            fi
          fi

      # [NEW] 鍏抽敭琛ㄥ閿害鏉熼獙璇侊紙鍙鏌ュ叧閿〃锛岄伩鍏岰olumn绾у埆澶栭敭鐨勮鎶ワ級
      - name: Verify Critical Tables Foreign Keys (Release Gate)
        run: |
          echo "[INFO] 楠岃瘉鍏抽敭琛ㄧ殑澶栭敭绾︽潫..."
          python scripts/test_migration_foreign_keys.py || {
            echo "[FAIL] Critical table foreign key verification failed"
            exit 1
          }
          echo "[OK] 鍏抽敭琛ㄥ閿害鏉熼獙璇侀€氳繃"

      # [NEW] 鏁版嵁搴撹縼绉绘祴璇曪紙鍦ㄤ复鏃舵暟鎹簱涓墽琛岃縼绉伙級
      - name: Validate Database Migrations (Release Gate)
        env:
          DATABASE_URL: postgresql://migration_test_user:migration_test_pass@localhost:5432/migration_test_db
        run: |
          echo "[INFO] 鍦ㄤ复鏃舵暟鎹簱涓祴璇曡縼绉?.."

          # 绛夊緟 PostgreSQL 灏辩华
          echo "[INFO] 绛夊緟 PostgreSQL 灏辩华..."
          for i in $(seq 1 30); do
            if PGPASSWORD=migration_test_pass psql -h localhost -U migration_test_user -d migration_test_db -c "SELECT 1" >/dev/null 2>&1; then
              echo "[OK] PostgreSQL is ready"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "[FAIL] PostgreSQL 鍚姩瓒呮椂"
              exit 1
            fi
            sleep 1
          done

          # 鎵ц杩佺Щ
          echo "[INFO] 鎵ц鏁版嵁搴撹縼绉?.."
          alembic upgrade heads || {
            echo "[FAIL] 杩佺Щ鎵ц澶辫触"
            echo "[INFO] Please inspect the migration script output above."
            exit 1
          }

          # Count the created tables after migration finishes.
          TABLE_COUNT=$(PGPASSWORD=migration_test_pass psql -h localhost -U migration_test_user -d migration_test_db -t -c \
            "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='public' AND table_type='BASE TABLE'" | tr -d ' \n')

          echo "[INFO] 鍒涘缓浜?${TABLE_COUNT} 寮犺〃"

          if [ "${TABLE_COUNT}" -lt 50 ]; then
            echo "[WARNING] 琛ㄦ暟閲忚繃灏戯紙鏈熸湜鑷冲皯 50 寮狅紝瀹為檯 ${TABLE_COUNT} 寮狅級"
            echo "[INFO] 杩欏彲鑳借〃绀鸿縼绉讳笉瀹屾暣"
          else
            echo "[OK] 琛ㄦ暟閲忔甯革紙${TABLE_COUNT} 寮狅級"
          fi

          # Verify the critical tables exist after migration.
          KEY_TABLES=("dim_products" "bridge_product_keys" "fact_product_metrics" "dim_product_master")
          for table_name in "${KEY_TABLES[@]}"; do
            EXISTS=$(PGPASSWORD=migration_test_pass psql -h localhost -U migration_test_user -d migration_test_db -t -c \
              "SELECT EXISTS (SELECT FROM information_schema.tables WHERE table_schema='public' AND table_name='${table_name}')" | tr -d ' \n')
            if [ "${EXISTS}" = "t" ]; then
              echo "[OK] 琛?${table_name} 瀛樺湪"
            else
              echo "[FAIL] Required table missing: ${table_name}"
              exit 1
            fi
          done

          echo "[OK] 鏁版嵁搴撹縼绉绘祴璇曢€氳繃"

      # [NOTE] 鍙戝竷闂ㄧ锛歵ag 鍙戝竷蹇呴』閫氳繃杩欎簺妫€鏌ワ紱澶辫触浼氶樆鏂?build 鍜?deploy
      # [FIX] 鍙獙璇佹敼鍔ㄧ殑 router 鏂囦欢锛岄伩鍏嶅巻鍙查仐鐣欓棶棰橀樆鏂柊鍙戝竷
      - name: Validate API Contracts (Release Gate)
        run: |
          if [ "${{ steps.changed-files.outputs.has_prev_tag }}" == "true" ] && [ -f "temp/changed_files.txt" ]; then
            echo "[INFO] 鍙獙璇佹敼鍔ㄧ殑 router 鏂囦欢..."
            python scripts/validate_api_contracts.py --changed-files temp/changed_files.txt
          else
            echo "[INFO] 鏈壘鍒版敼鍔ㄦ枃浠跺垪琛紝楠岃瘉鎵€鏈夋枃浠?.."
            python scripts/validate_api_contracts.py
          fi

      - name: Validate Frontend API Methods (Release Gate)
        run: |
          if [ "${{ steps.changed-files.outputs.has_prev_tag }}" == "true" ] && [ -f "temp/changed_files.txt" ]; then
            echo "[INFO] 鍙獙璇佹敼鍔ㄧ殑鍓嶇鏂囦欢..."
            python scripts/validate_frontend_api_methods.py --changed-files temp/changed_files.txt
          else
            echo "[INFO] 鏈壘鍒版敼鍔ㄦ枃浠跺垪琛紝楠岃瘉鎵€鏈夊墠绔枃浠?.."
            python scripts/validate_frontend_api_methods.py
          fi

      - name: Validate Database Fields (Release Gate)
        run: python scripts/validate_database_fields.py

  build-and-push:
    name: Build and Push Images (Release Tag)
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ github.event_name == 'push' }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code (tag)
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # [FIX] 鍚屾椂鎺ㄩ€佸甫 v 鍓嶇紑鐨?tag锛坴4.20.5 / 4.20.5锛夛紝閬垮厤閮ㄧ讲绔壘涓嶅埌 manifest
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            # [FIX] 鍥哄畾 sha tag 瑙勫垯锛岄伩鍏嶇敓鎴愰潪娉?tag
            type=sha,format=short,prefix=sha-

      - name: Extract metadata (tags, labels) for backend-full (collection)
        id: meta-backend-full
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}
          tags: |
            # full 闀滃儚浠呴殢 tag 鍙戝竷锛坴4.22.4-full / 4.22.4-full锛?            type=semver,pattern={{version}}-full
            type=semver,pattern={{major}}.{{minor}}-full
            type=semver,pattern=v{{version}}-full
            type=semver,pattern=v{{major}}.{{minor}}-full
            type=sha,format=short,prefix=sha-,suffix=-full

      - name: Extract metadata (tags, labels) for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # [FIX] 鍚屾椂鎺ㄩ€佸甫 v 鍓嶇紑鐨?tag锛坴4.20.5 / 4.20.5锛?            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            # [FIX] 鍥哄畾 sha tag 瑙勫垯锛岄伩鍏嶇敓鎴愰潪娉?tag
            type=sha,format=short,prefix=sha-

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PYTHON_VERSION=3.11

      - name: Build and push backend-full image (collection, Dockerfile.collection)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.collection
          push: true
          tags: ${{ steps.meta-backend-full.outputs.tags }}
          labels: ${{ steps.meta-backend-full.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: production
          build-args: |
            NODE_VERSION=24
            VITE_API_URL=${{ secrets.VITE_API_URL || 'http://localhost:8001' }}

      # [NEW] 娣峰悎妯″紡锛氬悓鏃舵帹閫佸埌 CNB.cool锛堝浗鍐呴暅鍍忎粨搴擄紝鍔犻€熼儴缃诧級
      - name: Log in to CNB Registry
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          registry: docker.cnb.cool
          username: cnb
          password: ${{ secrets.CNB_TOKEN }}

      - name: Push backend image to CNB
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          # Extract the release tag from refs/tags/vX.Y.Z.
          TAG="${GITHUB_REF#refs/tags/}"
          echo "[INFO] Pushing backend to CNB with tag: ${TAG}"

          # 浠?GHCR 鎷夊彇闀滃儚锛堝垰鏋勫缓鐨勶級
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:${TAG}

          # 鏍囪涓?CNB 闀滃儚
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:${TAG} \
            docker.cnb.cool/${{ secrets.CNB_IMAGE_NAME_BACKEND }}:${TAG}

          # 鎺ㄩ€佸埌 CNB
          docker push docker.cnb.cool/${{ secrets.CNB_IMAGE_NAME_BACKEND }}:${TAG}

          echo "[OK] Backend image pushed to CNB successfully"

      - name: Push frontend image to CNB
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          # 鑾峰彇闀滃儚鏍囩
          TAG="${GITHUB_REF#refs/tags/}"
          echo "[INFO] Pushing frontend to CNB with tag: ${TAG}"

          # 浠?GHCR 鎷夊彇闀滃儚锛堝垰鏋勫缓鐨勶級
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:${TAG}

          # 鏍囪涓?CNB 闀滃儚
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:${TAG} \
            docker.cnb.cool/${{ secrets.CNB_IMAGE_NAME_FRONTEND }}:${TAG}

          # 鎺ㄩ€佸埌 CNB
          docker push docker.cnb.cool/${{ secrets.CNB_IMAGE_NAME_FRONTEND }}:${TAG}

          echo "[OK] Frontend image pushed to CNB successfully"

  deploy-tag:
    name: Deploy to Production (Tag Release)
    runs-on: ubuntu-latest
    needs: [check-config, validate, build-and-push]
    if: ${{ needs.check-config.outputs.can_deploy == 'true' && github.event_name == 'push' }}
    environment:
      name: production

    steps:
      - name: Checkout code (tag)
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}

      - name: Determine deploy tag (from ref)
        id: image-tag
        run: |
          echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          echo "Deploying with tag: ${GITHUB_REF_NAME}"

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}

      - name: Configure SSH known_hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.PRODUCTION_HOST_KEY }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Sync compose files to production server
        env:
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER || 'root' }}
          PRODUCTION_PATH: ${{ secrets.PRODUCTION_PATH || '/opt/xihong_erp' }}
        run: |
          echo "[INFO] Uploading deployment bundle via SCP..."

          scp_with_retry() {
            local file="$1"
            local remote_path="$2"
            local max_retries=3
            local retry_delay=5

            for i in $(seq 1 ${max_retries}); do
              echo "[INFO] Upload attempt ${i}/${max_retries} for $(basename ${file})..."
              if scp \
                  -o ServerAliveInterval=30 \
                  -o ServerAliveCountMax=10 \
                  -o ConnectTimeout=30 \
                  "${file}" ${PRODUCTION_USER}@${PRODUCTION_HOST}:${remote_path}; then
                echo "[OK] $(basename ${file}) uploaded successfully"
                return 0
              else
                if [ ${i} -eq ${max_retries} ]; then
                  echo "[FAIL] Failed to upload $(basename ${file}) after ${max_retries} attempts"
                  echo "[INFO] Possible causes:"
                  echo "  - SSH server is temporarily unavailable"
                  echo "  - Network connectivity issues"
                  echo "  - SSH connection limit reached"
                  echo "[INFO] Please check server SSH service and network status"
                  return 1
                else
                  echo "[WARN] Upload failed, retrying in ${retry_delay} seconds..."
                  sleep ${retry_delay}
                fi
              fi
            done
          }

          echo "[INFO] Testing SSH connection..."
          if ssh \
              -o ConnectTimeout=10 \
              -o BatchMode=yes \
              ${PRODUCTION_USER}@${PRODUCTION_HOST} \
              "echo '[OK] SSH connection successful'" 2>/dev/null; then
            echo "[OK] SSH connection test passed"
          else
            echo "[WARN] SSH connection test failed, but continuing with upload (may be transient issue)..."
          fi

          echo "[INFO] Building deployment bundle..."
          chmod +x scripts/build_deploy_bundle.sh
          BUNDLE_PATH="$(scripts/build_deploy_bundle.sh "$(pwd)" "temp/deploy_bundle.tgz")"
          echo "[OK] Deployment bundle created: ${BUNDLE_PATH}"

          if ! ssh \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=10 \
              -o ConnectTimeout=30 \
              ${PRODUCTION_USER}@${PRODUCTION_HOST} \
              "mkdir -p \"${PRODUCTION_PATH}\""; then
            echo "[FAIL] Failed to prepare remote deployment directory under ${PRODUCTION_PATH}"
            exit 1
          fi

          if ! scp_with_retry "${BUNDLE_PATH}" ${PRODUCTION_PATH}/deploy_bundle.tgz; then
            exit 1
          fi

          if ! ssh \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=10 \
              -o ConnectTimeout=30 \
              ${PRODUCTION_USER}@${PRODUCTION_HOST} \
              "mkdir -p \"${PRODUCTION_PATH}\" \"${PRODUCTION_PATH}/config\" \"${PRODUCTION_PATH}/sql/init\" \"${PRODUCTION_PATH}/nginx\" \"${PRODUCTION_PATH}/nginx/ssl\" && tar -xzf \"${PRODUCTION_PATH}/deploy_bundle.tgz\" -C \"${PRODUCTION_PATH}\" && rm -f \"${PRODUCTION_PATH}/deploy_bundle.tgz\" && chmod +x \"${PRODUCTION_PATH}/deploy_remote_production.sh\""; then
            echo "[FAIL] Failed to extract deployment bundle on server"
            exit 1
          fi

          rm -f "${BUNDLE_PATH}"
          echo "[OK] Deployment bundle synced successfully via SCP"
      - name: Backup current deployment
        env:
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER || 'root' }}
          PRODUCTION_PATH: ${{ secrets.PRODUCTION_PATH || '/opt/xihong_erp' }}
        run: |
          # [FIX] 浣跨敤 bash -c 杩滅▼鎵ц锛岄伩鍏?heredoc 璇硶闂
          ssh \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=10 \
              ${PRODUCTION_USER}@${PRODUCTION_HOST} \
              "bash -c 'set -e; \
              cd \"${PRODUCTION_PATH}\"; \
              BACKUP_DIR=\"backups/pre_deploy_\$(date +%Y%m%d_%H%M%S)\"; \
              mkdir -p \"\${BACKUP_DIR}\"; \
              docker-compose -f docker-compose.yml -f docker-compose.prod.yml --profile production config > \"\${BACKUP_DIR}/docker-compose.config.yaml\" 2>&1 || echo \"[WARN] Docker Compose config validation failed, but continuing backup...\"; \
              docker ps --format \"{{.Names}} {{.Image}}\" > \"\${BACKUP_DIR}/running_containers.txt\" || true; \
              echo \"[OK] Pre-deployment backup completed: \${BACKUP_DIR}\"'"

      - name: Deploy to production server
        env:
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER || 'root' }}
          PRODUCTION_PATH: ${{ secrets.PRODUCTION_PATH || '/opt/xihong_erp' }}
          IMAGE_TAG: ${{ steps.image-tag.outputs.tag }}
        run: |
          # [FIX] 鏂规A锛氶儴缃查€昏緫缁熶竴灏佽鍒拌剼鏈紝閬垮厤瓒呴暱 bash -c 鐗囨瀵艰嚧寮曞彿/鎹㈣闂
          # 閫氳繃 stdin 浼犻€?token锛岄伩鍏嶆妸 token 鍐欒繘杩滅▼鍛戒护琛屽弬鏁?          # [NEW] 娣峰悎妯″紡锛氬悓鏃朵紶閫?GHCR 鍜?CNB token锛屼紭鍏堜娇鐢?CNB锛堝浗鍐呮洿蹇級
          printf '%s\n%s\n' "${{ secrets.GITHUB_TOKEN }}" "${{ secrets.CNB_TOKEN }}" | ssh \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            ${PRODUCTION_USER}@${PRODUCTION_HOST} \
            "bash -c 'set -e; cd \"${PRODUCTION_PATH}\"; \
              read -r GHCR_TOKEN; \
              read -r CNB_TOKEN; \
              export GHCR_TOKEN; \
              export CNB_TOKEN; \
              chmod +x ./deploy_remote_production.sh; \
              export GHCR_REGISTRY=\"${{ env.REGISTRY }}\"; \
              export GHCR_USER=\"${{ github.actor }}\"; \
              export IMAGE_NAME_BACKEND=\"${{ env.IMAGE_NAME_BACKEND }}\"; \
              export IMAGE_NAME_FRONTEND=\"${{ env.IMAGE_NAME_FRONTEND }}\"; \
              export IMAGE_TAG=\"${IMAGE_TAG}\"; \
              export CNB_REGISTRY=\"${{ secrets.CNB_REGISTRY }}\"; \
              export CNB_IMAGE_NAME_BACKEND=\"${{ secrets.CNB_IMAGE_NAME_BACKEND }}\"; \
              export CNB_IMAGE_NAME_FRONTEND=\"${{ secrets.CNB_IMAGE_NAME_FRONTEND }}\"; \
              export KEEP_IMAGES_COUNT=\"${{ secrets.KEEP_IMAGES_COUNT || '5' }}\"; \
              bash ./deploy_remote_production.sh'"

  deploy-manual:
    name: Deploy to Production (Manual)
    runs-on: ubuntu-latest
    needs: check-config
    if: ${{ needs.check-config.outputs.can_deploy == 'true' && github.event_name == 'workflow_dispatch' }}
    environment:
      name: production
    steps:
      - name: Checkout code (main)
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Verify deployment confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DEPLOY" ]; then
            echo "Deployment confirmation failed. Please type 'DEPLOY' to confirm."
            exit 1
          fi
          echo "Deployment confirmed"

      - name: Determine deploy tag (manual input)
        id: image-tag
        run: |
          echo "tag=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          echo "Deploying with tag: ${{ github.event.inputs.image_tag }}"

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}

      - name: Configure SSH known_hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.PRODUCTION_HOST_KEY }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Sync compose files to production server
        env:
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER || 'root' }}
          PRODUCTION_PATH: ${{ secrets.PRODUCTION_PATH || '/opt/xihong_erp' }}
        run: |
          echo "[INFO] Uploading deployment bundle via SCP..."

          scp_with_retry() {
            local file="$1"
            local remote_path="$2"
            local max_retries=3
            local retry_delay=5

            for i in $(seq 1 ${max_retries}); do
              echo "[INFO] Upload attempt ${i}/${max_retries} for $(basename ${file})..."
              if scp \
                  -o ServerAliveInterval=30 \
                  -o ServerAliveCountMax=10 \
                  -o ConnectTimeout=30 \
                  "${file}" ${PRODUCTION_USER}@${PRODUCTION_HOST}:${remote_path}; then
                echo "[OK] $(basename ${file}) uploaded successfully"
                return 0
              else
                if [ ${i} -eq ${max_retries} ]; then
                  echo "[FAIL] Failed to upload $(basename ${file}) after ${max_retries} attempts"
                  echo "[INFO] Possible causes:"
                  echo "  - SSH server is temporarily unavailable"
                  echo "  - Network connectivity issues"
                  echo "  - SSH connection limit reached"
                  echo "[INFO] Please check server SSH service and network status"
                  return 1
                else
                  echo "[WARN] Upload failed, retrying in ${retry_delay} seconds..."
                  sleep ${retry_delay}
                fi
              fi
            done
          }

          echo "[INFO] Testing SSH connection..."
          if ssh \
              -o ConnectTimeout=10 \
              -o BatchMode=yes \
              ${PRODUCTION_USER}@${PRODUCTION_HOST} \
              "echo '[OK] SSH connection successful'" 2>/dev/null; then
            echo "[OK] SSH connection test passed"
          else
            echo "[WARN] SSH connection test failed, but continuing with upload (may be transient issue)..."
          fi

          echo "[INFO] Building deployment bundle..."
          chmod +x scripts/build_deploy_bundle.sh
          BUNDLE_PATH="$(scripts/build_deploy_bundle.sh "$(pwd)" "temp/deploy_bundle.tgz")"
          echo "[OK] Deployment bundle created: ${BUNDLE_PATH}"

          if ! ssh \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=10 \
              -o ConnectTimeout=30 \
              ${PRODUCTION_USER}@${PRODUCTION_HOST} \
              "mkdir -p \"${PRODUCTION_PATH}\""; then
            echo "[FAIL] Failed to prepare remote deployment directory under ${PRODUCTION_PATH}"
            exit 1
          fi

          if ! scp_with_retry "${BUNDLE_PATH}" ${PRODUCTION_PATH}/deploy_bundle.tgz; then
            exit 1
          fi

          if ! ssh \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=10 \
              -o ConnectTimeout=30 \
              ${PRODUCTION_USER}@${PRODUCTION_HOST} \
              "mkdir -p \"${PRODUCTION_PATH}\" \"${PRODUCTION_PATH}/config\" \"${PRODUCTION_PATH}/sql/init\" \"${PRODUCTION_PATH}/nginx\" \"${PRODUCTION_PATH}/nginx/ssl\" && tar -xzf \"${PRODUCTION_PATH}/deploy_bundle.tgz\" -C \"${PRODUCTION_PATH}\" && rm -f \"${PRODUCTION_PATH}/deploy_bundle.tgz\" && chmod +x \"${PRODUCTION_PATH}/deploy_remote_production.sh\""; then
            echo "[FAIL] Failed to extract deployment bundle on server"
            exit 1
          fi

          rm -f "${BUNDLE_PATH}"
          echo "[OK] Deployment bundle synced successfully via SCP"
      - name: Backup current deployment
        env:
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER || 'root' }}
          PRODUCTION_PATH: ${{ secrets.PRODUCTION_PATH || '/opt/xihong_erp' }}
        run: |
          ssh \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=10 \
              ${PRODUCTION_USER}@${PRODUCTION_HOST} \
              "bash -c 'set -e; \
              cd \"${PRODUCTION_PATH}\"; \
              BACKUP_DIR=\"backups/pre_deploy_$(date +%Y%m%d_%H%M%S)\"; \
              mkdir -p \"${BACKUP_DIR}\"; \
              docker-compose -f docker-compose.yml -f docker-compose.prod.yml --profile production config > \"${BACKUP_DIR}/docker-compose.config.yaml\" 2>&1 || echo \"[WARN] Docker Compose config validation failed, but continuing backup...\"; \
              docker ps --format \"{{.Names}} {{.Image}}\" > \"${BACKUP_DIR}/running_containers.txt\" || true; \
              echo \"[OK] Pre-deployment backup completed: ${BACKUP_DIR}\"'"

      - name: Deploy to production server
        env:
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER || 'root' }}
          PRODUCTION_PATH: ${{ secrets.PRODUCTION_PATH || '/opt/xihong_erp' }}
          IMAGE_TAG: ${{ steps.image-tag.outputs.tag }}
        run: |
          # [FIX] 鏂规A锛氫笌 deploy-tag 浣跨敤鍚屼竴鑴氭湰锛岀‘淇濇墜鍔ㄩ儴缃?鍥炴粴璺緞涓庤嚜鍔ㄥ彂甯冧竴鑷?          # [NEW] 娣峰悎妯″紡锛氬悓鏃朵紶閫?GHCR 鍜?CNB token锛屼紭鍏堜娇鐢?CNB锛堝浗鍐呮洿蹇級
          printf '%s\n%s\n' "${{ secrets.GITHUB_TOKEN }}" "${{ secrets.CNB_TOKEN }}" | ssh \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            ${PRODUCTION_USER}@${PRODUCTION_HOST} \
            "bash -c 'set -e; cd \"${PRODUCTION_PATH}\"; \
              read -r GHCR_TOKEN; \
              read -r CNB_TOKEN; \
              export GHCR_TOKEN; \
              export CNB_TOKEN; \
              chmod +x ./deploy_remote_production.sh; \
              export GHCR_REGISTRY=\"${{ env.REGISTRY }}\"; \
              export GHCR_USER=\"${{ github.actor }}\"; \
              export IMAGE_NAME_BACKEND=\"${{ env.IMAGE_NAME_BACKEND }}\"; \
              export IMAGE_NAME_FRONTEND=\"${{ env.IMAGE_NAME_FRONTEND }}\"; \
              export IMAGE_TAG=\"${IMAGE_TAG}\"; \
              export CNB_REGISTRY=\"${{ secrets.CNB_REGISTRY }}\"; \
              export CNB_IMAGE_NAME_BACKEND=\"${{ secrets.CNB_IMAGE_NAME_BACKEND }}\"; \
              export CNB_IMAGE_NAME_FRONTEND=\"${{ secrets.CNB_IMAGE_NAME_FRONTEND }}\"; \
              export KEEP_IMAGES_COUNT=\"${{ secrets.KEEP_IMAGES_COUNT || '5' }}\"; \
              bash ./deploy_remote_production.sh'"

      - name: Health check verification
        env:
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
        run: |
          if [ -z "${PRODUCTION_URL}" ]; then
            echo "[WARN] PRODUCTION_URL not configured, skipping external health check"
            exit 0
          fi

          # [FIX] 鍩熷悕澶囨鏈熼棿锛屽鏋滈厤缃簡 HTTPS 浣?SSL 璇佷功鏈厤缃紝鑷姩闄嶇骇鍒?HTTP
          HEALTH_CHECK_URL="${PRODUCTION_URL}"
          if [[ "${PRODUCTION_URL}" == https://* ]]; then
            echo "[INFO] PRODUCTION_URL is HTTPS, attempting HTTPS health check first..."
            
            # 鍏堝皾璇?HTTPS锛堝鏋?SSL 宸查厤缃級
            HTTPS_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 --connect-timeout 5 ${PRODUCTION_URL}/health 2>/dev/null || echo "000")
            
            if [ "${HTTPS_CODE}" = "200" ]; then
              echo "[OK] HTTPS health check passed, using HTTPS"
            else
              # HTTPS 澶辫触锛岄檷绾у埌 HTTP锛堝煙鍚嶅妗堟湡闂达紝SSL 璇佷功鍙兘鏈厤缃級
              HTTP_URL="${PRODUCTION_URL/https:\/\//http:\/\/}"
              echo "[INFO] HTTPS health check failed (HTTP ${HTTPS_CODE}), domain may be in ICP filing process"
              echo "[INFO] Falling back to HTTP for health check: ${HTTP_URL}/health"
              echo "[INFO] Note: After ICP filing is completed and SSL certificate is configured, HTTPS will be used"
              HEALTH_CHECK_URL="${HTTP_URL}"
            fi
          fi

          echo "[INFO] Checking production health at: ${HEALTH_CHECK_URL}/health"

          # Retry the external health check with diagnostics.
          MAX_RETRIES=5
          RETRY_DELAY=10

          for i in $(seq 1 ${MAX_RETRIES}); do
            echo "[INFO] Health check attempt $i/${MAX_RETRIES}..."
            
            # Probe the health endpoint with explicit timeout handling.
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 --connect-timeout 10 ${HEALTH_CHECK_URL}/health 2>/dev/null || echo "000")
            
            if [ "${HTTP_CODE}" = "200" ]; then
              echo "[OK] Production health check passed (HTTP ${HTTP_CODE})"
              if [[ "${HEALTH_CHECK_URL}" == http://* ]] && [[ "${PRODUCTION_URL}" == https://* ]]; then
                echo "[INFO] Using HTTP during ICP filing period. HTTPS will be enabled after SSL certificate is configured."
              fi
              exit 0
            else
              echo "[WARN] Health check failed (HTTP ${HTTP_CODE}), attempt $i/${MAX_RETRIES}"
              
              if [ $i -lt ${MAX_RETRIES} ]; then
                echo "[INFO] Retrying in ${RETRY_DELAY} seconds..."
                sleep ${RETRY_DELAY}
              else
                echo "[FAIL] Production health check failed after ${MAX_RETRIES} attempts"
                echo "[INFO] Final HTTP Status Code: ${HTTP_CODE}"
                echo "[INFO] Health Check URL used: ${HEALTH_CHECK_URL}/health"
                echo "[INFO] Original PRODUCTION_URL: ${PRODUCTION_URL}"
                echo "[INFO] Please check:"
                echo "  1. Is the production URL correct? (${PRODUCTION_URL})"
                echo "  2. Is the service running and accessible?"
                echo "  3. Is the /health endpoint responding?"
                echo "  4. Check server logs: docker logs xihong_erp_backend"
                echo "  5. If domain is in ICP filing process, ensure DNS points to server IP"
                echo "  6. Check server firewall/security group allows port 80 (HTTP)"
                
                # 灏濊瘯鑾峰彇鏇村璇婃柇淇℃伅
                echo "[INFO] Attempting to get more diagnostic information..."
                curl -v --max-time 10 ${HEALTH_CHECK_URL}/health 2>&1 | head -20 || true
                
                exit 1
              fi
            fi
          done

      - name: Set up SSH for rollback
        if: failure()
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}

      - name: Configure SSH known_hosts for rollback
        if: failure()
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.PRODUCTION_HOST_KEY }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Rollback on failure
        if: failure()
        env:
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER || 'root' }}
          PRODUCTION_PATH: ${{ secrets.PRODUCTION_PATH || '/opt/xihong_erp' }}
        run: |
          # [FIX] 閬垮厤 heredoc 璇硶闂锛屼娇鐢?bash -c 鎵ц杩滅▼鍛戒护
          ssh \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=10 \
              ${PRODUCTION_USER}@${PRODUCTION_HOST} \
              "bash -c '
            set -e
              cd \"${PRODUCTION_PATH}\"
            
              echo \"[WARNING] Deployment failed, attempting rollback...\"
            
            # 鏌ユ壘涓婁竴涓垚鍔熺殑閮ㄧ讲澶囦唤
              LAST_BACKUP=\$(ls -td backups/pre_deploy_* 2>/dev/null | head -1)
              if [ -n \"\${LAST_BACKUP}\" ]; then
                echo \"Found backup: \${LAST_BACKUP}\"
                # Keep rollback manual until the recovery procedure is formalized.
                echo \"[WARNING] Manual rollback required. Check backup: \${LAST_BACKUP}\"
            else
                echo \"[WARNING] No backup found for rollback\"
            fi
              '"

      - name: Send deployment notification
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author,action,eventName,ref,workflow
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true # 濡傛灉 SLACK_WEBHOOK_URL 鏈厤缃細闈欓粯澶辫触

  # 褰撻儴缃茶璺宠繃鏃舵樉绀烘秷鎭?
  skip-notification:
    runs-on: ubuntu-latest
    needs: check-config
    if: ${{ needs.check-config.outputs.can_deploy == 'false' }}
    steps:
      - name: Deployment skipped
        run: |
          echo "========================================"
          echo "Deployment to production was SKIPPED"
          echo "========================================"
          echo ""
          echo "Required GitHub Secrets not configured:"
          echo "  - PRODUCTION_SSH_PRIVATE_KEY"
          echo "  - PRODUCTION_HOST"
          echo "  - PRODUCTION_HOST_KEY"
          echo ""
          echo "To enable deployment, configure these secrets in:"
          echo "  Settings > Secrets and variables > Actions"
          echo "========================================"
