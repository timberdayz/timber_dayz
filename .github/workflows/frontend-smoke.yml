name: Frontend Playwright Smoke

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PYTHONPATH: ${{ github.workspace }}

jobs:
  frontend-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ENVIRONMENT: development
      TEST_MODE: "true"
      HOST: 127.0.0.1
      PORT: 8001
      FRONTEND_PORT: 5173
      DATABASE_URL: sqlite:///${{ github.workspace }}/data/frontend_smoke.db
      JWT_SECRET_KEY: github-actions-smoke-jwt-secret
      SECRET_KEY: github-actions-smoke-secret
      ALLOWED_ORIGINS: http://127.0.0.1:5173
      ALLOWED_HOSTS: 127.0.0.1,localhost
      REDIS_ENABLED: "false"
      PLAYWRIGHT_HEADLESS: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
          pip install aiosqlite

      - name: Prepare smoke environment
        run: |
          mkdir -p data logs temp output
          if [ -f env.template ]; then
            cp env.template .env
          else
            touch .env
          fi

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start backend
        run: |
          nohup python -m uvicorn backend.main:app --host 127.0.0.1 --port 8001 > backend-smoke.log 2>&1 &
          echo $! > backend-smoke.pid

      - name: Wait for backend health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8001/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become healthy in time"
          if [ -f backend-smoke.log ]; then
            echo "===== backend-smoke.log ====="
            cat backend-smoke.log
          fi
          exit 1

      - name: Start frontend
        run: |
          nohup npm --prefix frontend run dev > frontend-smoke.log 2>&1 &
          echo $! > frontend-smoke.pid

      - name: Wait for frontend
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:5173/index.html >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Frontend did not become ready in time"
          exit 1

      - name: Run frontend smoke
        timeout-minutes: 10
        working-directory: frontend
        env:
          FRONTEND_BASE_URL: http://127.0.0.1:5173
          PYTHON_BIN: python
          PLAYWRIGHT_ROUTE_TIMEOUT_MS: 45000
        run: npm run smoke:playwright 2>&1 | tee ../frontend-smoke-run.log

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-playwright-smoke
          path: |
            output/playwright/frontend-smoke/**
            backend-smoke.log
            frontend-smoke.log
            frontend-smoke-run.log
          if-no-files-found: warn

      - name: Stop local services
        if: always()
        run: |
          if [ -f backend-smoke.pid ]; then kill $(cat backend-smoke.pid) || true; fi
          if [ -f frontend-smoke.pid ]; then kill $(cat frontend-smoke.pid) || true; fi
