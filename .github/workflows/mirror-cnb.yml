name: Mirror Git refs to CNB

on:
  push:
    branches:
      - main
    tags:
      - "v*"

concurrency:
  group: mirror-git-refs-to-cnb-${{ github.ref }}
  cancel-in-progress: false

jobs:
  mirror:
    name: Mirror Git refs to CNB
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Push current ref to CNB Git mirror
        env:
          CNB_GIT_TOKEN: ${{ secrets.CNB_GIT_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${CNB_GIT_TOKEN}" ]; then
            echo "[WARN] CNB_GIT_TOKEN is not configured; skipping CNB Git mirror"
            exit 0
          fi

          git remote add cnb-mirror "https://cnb:${CNB_GIT_TOKEN}@cnb.cool/timberdayz/xihong_erp"
          if [ "${GITHUB_REF_TYPE}" = "branch" ] && [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "[INFO] Mirroring main branch to CNB Git"
            git push cnb-mirror HEAD:refs/heads/main
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "[INFO] Mirroring release tag ${GITHUB_REF_NAME} to CNB Git"
            git push cnb-mirror "refs/tags/${GITHUB_REF_NAME}:refs/tags/${GITHUB_REF_NAME}"
          else
            echo "[INFO] Ref ${GITHUB_REF} is not mirrored"
          fi
