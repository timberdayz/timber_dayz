# Xihong ERP local collection development overlay.
# Use with docker-compose.yml and docker-compose.dev.yml so backend runs with
# Dockerfile.collection and Playwright enabled.
#
# Current path:
#   docker-compose -f docker-compose.yml -f docker-compose.dev.yml -f docker-compose.collection-dev.yml --profile dev-full up -d
#
# Historical note:
#   Legacy Metabase overlays were removed from the active collection startup path.

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.collection
    environment:
      ENABLE_COLLECTION: "true"
    shm_size: "2gb"
