# Windows collection-machine overlay for Docker Desktop + backend-collector only.
#
# Recommended startup:
#   docker-compose -f docker-compose.yml -f docker-compose.dev.yml -f docker-compose.collection-cloud-sync.yml --profile collection-cloud-sync up -d postgres redis migrate backend-collector
#
# This overlay intentionally keeps the formal always-on role limited to backend-collector.

services:
  postgres:
    profiles:
      - collection-cloud-sync

  redis:
    profiles:
      - collection-cloud-sync

  migrate:
    profiles:
      - collection-cloud-sync

  backend-collector:
    build:
      context: .
      dockerfile: Dockerfile.collection
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-erp_user}:${POSTGRES_PASSWORD:-erp_pass_2025}@postgres:5432/${POSTGRES_DB:-xihong_erp}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_pass_2025}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis_pass_2025}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redis_pass_2025}@redis:6379/0
      RUN_MIGRATIONS: "0"
      DEPLOYMENT_ROLE: "collector"
      APP_RUNTIME_MODE: "collector"
      ENABLE_COLLECTION: "true"
      CLOUD_SYNC_WORKER_ENABLED: ${CLOUD_SYNC_WORKER_ENABLED:-true}
      CLOUD_SYNC_WORKER_ID: ${CLOUD_SYNC_WORKER_ID:-cloud-sync-worker-1}
      CLOUD_SYNC_POLL_INTERVAL_SECONDS: ${CLOUD_SYNC_POLL_INTERVAL_SECONDS:-5}
      CLOUD_SYNC_BATCH_SIZE: ${CLOUD_SYNC_BATCH_SIZE:-100}
      CLOUD_DATABASE_URL: ${CLOUD_DATABASE_URL}
      CLOUD_SYNC_TUNNEL_ENABLED: ${CLOUD_SYNC_TUNNEL_ENABLED:-true}
      CLOUD_SYNC_TUNNEL_HOST: ${CLOUD_SYNC_TUNNEL_HOST:-host.docker.internal}
      CLOUD_SYNC_TUNNEL_PORT: ${CLOUD_SYNC_TUNNEL_PORT:-15433}
      APP_ENV: ${APP_ENV:-development}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-true}
      DATABASE_ECHO: ${DATABASE_ECHO:-false}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1},backend
      PROJECT_ROOT: /app
      DATA_DIR: /app/data
      DATA_RAW_DIR: /app/data/raw
      DOWNLOADS_DIR: /app/downloads
      TEMP_DIR: /app/temp
      LOGS_DIR: /app/logs
    volumes:
      - ./backend:/app/backend
      - ./modules:/app/modules
      - ./migrations:/app/migrations
      - ./data:/app/data
      - ./downloads:/app/downloads
      - ./logs:/app/logs
      - ./temp:/app/temp
      - ./profiles:/app/profiles
      - ./config:/app/config
    ports: []
    shm_size: "2gb"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      erp_network:
        aliases:
          - backend-collector
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    profiles:
      - collection-cloud-sync
