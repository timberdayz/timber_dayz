# =====================================================
# Metabase BI工具 - Docker Compose配置
# =====================================================
# 用于DSS架构的BI层
# 使用方式: docker-compose -f docker-compose.metabase.yml up -d
# =====================================================
#
# [重要] Metabase 应用数据库配置说明：
# 
# 生产环境必须使用 PostgreSQL，不要使用 H2！
# Metabase 官方警告：
# "The embedded H2 database is for development and evaluation purposes only.
#  For production deployments, use PostgreSQL or MySQL."
#
# 本配置使用 PostgreSQL 作为 Metabase 应用数据库，支持：
# - 50-100+ 并发用户同时操作
# - 热备份（pg_dump）
# - 事务保护，数据安全
# - 高可用部署
#
# Metabase 数据架构：
# ┌─────────────────────────────────────────────────────┐
# │  PostgreSQL 容器                                     │
# │  ├── xihong_erp      # 业务数据库（Metabase 数据源）│
# │  └── metabase_app    # Metabase 应用数据库          │
# └─────────────────────────────────────────────────────┘
# =====================================================

services:
  # ==================== Metabase BI服务 ====================
  metabase:
    image: metabase/metabase:latest
    container_name: xihong_erp_metabase
    environment:
      # ==================== 应用数据库配置（PostgreSQL） ====================
      # Metabase 使用此数据库存储自己的配置：
      # - Models、Questions、Dashboards
      # - 用户账号和权限设置
      # - 数据源连接配置
      MB_DB_TYPE: postgres
      MB_DB_HOST: ${METABASE_DB_HOST:-postgres}
      MB_DB_PORT: ${METABASE_DB_PORT:-5432}
      MB_DB_DBNAME: ${METABASE_DB_DBNAME:-metabase_app}
      MB_DB_USER: ${METABASE_DB_USER:-erp_user}
      MB_DB_PASS: ${METABASE_DB_PASS:-erp_pass_2025}

      # 应用配置
      MB_ENCRYPTION_SECRET_KEY: ${METABASE_ENCRYPTION_SECRET_KEY:-change-this-encryption-key-in-production}

      # 嵌入配置（用于前端iframe嵌入）
      MB_EMBEDDING_SECRET_KEY: ${METABASE_EMBEDDING_SECRET_KEY:-change-this-embedding-key-in-production}

      # 语言配置
      MB_SITE_LOCALE: zh
      MB_SITE_NAME: 西虹ERP数据看板
      # 站点 URL（通过 Nginx 子路径访问时必填，否则 Metabase 前端空白）
      # 必须带尾部斜杠，与官方文档一致，否则 base-href 解析错误导致 app/dist 资源 404、白屏
      # 未配置 HTTPS 时用 http；配置 HTTPS 后改为 https://www.xihong.site/metabase/
      MB_SITE_URL: ${MB_SITE_URL:-http://www.xihong.site/metabase/}

      # 邮件配置（可选，用于告警）
      # MB_EMAIL_SMTP_HOST: smtp.example.com
      # MB_EMAIL_SMTP_PORT: 587
      # MB_EMAIL_SMTP_USERNAME: your-email@example.com
      # MB_EMAIL_SMTP_PASSWORD: your-password

      # 时区配置
      JAVA_TIMEZONE: Asia/Shanghai

      # 性能配置
      JAVA_OPTS: "-Xmx2g -Xms1g"

    # 生产最小端口暴露：默认不映射宿主机端口（通过 nginx 反向代理 /metabase/ 访问）
    # 如需本地开发直连 Metabase，请使用 docker-compose.metabase.dev.yml 添加 8080:3000 端口映射

    # 注意：使用 PostgreSQL 后，不再需要 metabase_data 卷存储 H2 文件
    # 但保留卷用于日志和临时文件
    volumes:
      - metabase_data:/metabase-data
      - ./logs/metabase:/logs

    networks:
      - erp_network

    # 注意：postgres服务在主docker-compose.yml中定义
    # 如果独立运行此文件，需要确保postgres容器已启动
    # depends_on:
    #   postgres:
    #     condition: service_healthy

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 1G

    profiles:
      - dev
      - production
      - full

# ==================== 网络配置 ====================
# 使用与主栈相同的 external 网络，确保 Nginx 容器能解析 metabase 主机名（避免 502 / metabase could not be resolved）
# 主栈（docker-compose.prod.yml）定义 networks.erp_network.name: xihong_erp_erp_network，须先启动主栈再 up metabase
networks:
  erp_network:
    external: true
    name: xihong_erp_erp_network

# ==================== 数据卷配置 ====================
volumes:
  metabase_data:
    driver: local
    name: xihong_erp_metabase_data
