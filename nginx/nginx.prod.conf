# 西虹ERP系统 - Nginx生产环境配置

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    include /etc/nginx/ssl/*.conf;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=12000r/m;
    limit_req_zone $binary_remote_addr zone=data_sync_limit:10m rate=300r/m;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=300r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;

    resolver 127.0.0.11 valid=30s ipv6=off;

    server {
        listen 80;
        server_name localhost 127.0.0.1 www.xihong.site xihong.site;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        location /api/ {
            limit_req zone=api_limit burst=1200 nodelay;
            limit_conn conn_limit 1000;

            set $backend_upstream "backend:8000";
            proxy_pass http://$backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host backend;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location ~ ^/api/(data-sync|collection)/ {
            limit_req zone=data_sync_limit burst=60 nodelay;
            limit_conn conn_limit 30;

            set $backend_upstream "backend:8000";
            proxy_pass http://$backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host backend;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        location ~ ^/api/(auth|login|register)/ {
            limit_req zone=auth_limit burst=60 nodelay;
            limit_conn conn_limit 50;

            set $backend_upstream "backend:8000";
            proxy_pass http://$backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host backend;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location /health {
            set $backend_upstream "backend:8000";
            proxy_pass http://$backend_upstream/health;
            proxy_http_version 1.1;
            proxy_set_header Host backend;
            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
            access_log off;
        }

        location ^~ /metabase/ {
            return 404;
        }

        location / {
            set $frontend_upstream "frontend:80";
            proxy_pass http://$frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        location ~* .*\.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
            set $frontend_upstream "frontend:80";
            proxy_pass http://$frontend_upstream;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        error_page 429 /429.html;
        location = /429.html {
            internal;
            return 429 '{"success": false, "error": "请求过于频繁，请稍后再试", "retry_after": 60}';
            add_header Content-Type application/json;
        }

        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;
    }
}
