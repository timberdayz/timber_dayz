[tool.black]
line-length = 88

[tool.ruff]
line-length = 88
extend-exclude = [
    "archive",
    "openspec",
    "backups",
    "output",
    "processed_data",
    "downloads",
    "test_downloads",
    "temp",
    "temp_test",
    "migration_temp",
    "node_modules",
    ".worktrees",
    ".git",
    ".ruff_cache",
    ".pytest_cache",
    "__pycache__",
]

[tool.mypy]
python_version = "3.13"
ignore_missing_imports = true
warn_unused_ignores = true
no_implicit_optional = false
show_error_codes = true

[tool.ruff.lint]
select = ["E", "F"]
ignore = ["E402", "E501", "E722", "F401", "F541"]

[tool.ruff.lint.per-file-ignores]
"backend/schemas/__init__.py" = ["E501", "F401", "I001"]
"backend/routers/component_versions.py" = ["E501"]
"backend/routers/data_quarantine.py" = ["E501"]
"backend/routers/users_admin.py" = ["E501"]
"scripts/high_frequency_pages_probe.py" = ["E402"]

[tool.ruff.format]
quote-style = "preserve"

[tool.pytest.ini_options]
testpaths = [
    "tests",
    "backend/tests",
]
markers = [
    "asyncio: marks tests as async (deselect with '-m \"not asyncio\"')",
    "slow: marks slower tests",
    "requires_browser: marks tests that require a real browser environment",
]
asyncio_mode = "auto"
filterwarnings = [
    "ignore:Support for class-based `config` is deprecated:DeprecationWarning",
    "ignore:`max_items` is deprecated and will be removed, use `max_length` instead:DeprecationWarning",
    "ignore:Test functions should return None:pytest.PytestReturnNotNoneWarning",
    "ignore:The default datetime adapter is deprecated as of Python 3.12:DeprecationWarning",
]
